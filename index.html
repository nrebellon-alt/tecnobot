<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TecnoBot — Tutor Grado 6°</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
#app { width: 100%; max-width: 480px; background: #fff; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; height: 90vh; max-height: 700px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); }
#header { background: #534AB7; padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
#header .hname { font-size: 15px; font-weight: 600; color: #EEEDFE; }
#header .hsub { font-size: 11px; color: #AFA9EC; }
#score-badge { background: #3C3489; color: #CECBF6; font-size: 12px; padding: 4px 10px; border-radius: 20px; display: none; margin-left: auto; white-space: nowrap; }
#messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: #f7f7fb; }
.msg { max-width: 84%; display: flex; flex-direction: column; gap: 3px; }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.6; }
.bubble p { margin-bottom: 6px; } .bubble p:last-child { margin-bottom: 0; }
.bubble strong { font-weight: 600; }
.msg.bot .bubble { background: #fff; border: 1px solid #e8e8f0; border-radius: 4px 16px 16px 16px; color: #222; }
.msg.user .bubble { background: #534AB7; color: #fff; border-radius: 16px 4px 16px 16px; }
.msg-time { font-size: 11px; color: #aaa; padding: 0 4px; }
.msg.user .msg-time { text-align: right; }
#typing { align-self: flex-start; background: #fff; border: 1px solid #e8e8f0; border-radius: 4px 16px 16px 16px; padding: 12px 16px; display: none; gap: 4px; }
#typing span { width: 7px; height: 7px; background: #7F77DD; border-radius: 50%; animation: bounce 1.2s infinite; display: inline-block; }
#typing span:nth-child(2) { animation-delay: .2s; }
#typing span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-7px)} }
#input-area { display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid #eee; background: #fff; }
#user-input { flex: 1; border: 1px solid #ddd; border-radius: 10px; padding: 8px 12px; font-size: 14px; font-family: inherit; resize: none; height: 40px; color: #222; background: #fafafa; }
#user-input:focus { outline: none; border-color: #7F77DD; background: #fff; }
#send-btn { background: #534AB7; color: #fff; border: none; border-radius: 10px; padding: 0 18px; font-size: 14px; cursor: pointer; font-family: inherit; transition: background .15s; }
#send-btn:hover { background: #3C3489; }
#send-btn:disabled { background: #ccc; cursor: not-allowed; }
.eval-card { background: #EEEDFE; border: 1px solid #AFA9EC; border-radius: 12px; padding: 14px 16px; margin-top: 8px; }
.eval-card .etitle { font-size: 12px; color: #534AB7; margin-bottom: 8px; font-weight: 600; }
.eval-card .enota { font-size: 28px; font-weight: 700; color: #3C3489; }
.eval-card .enota span { font-size: 14px; color: #534AB7; font-weight: 400; }
.eval-card .edet { font-size: 12px; color: #3C3489; margin-top: 8px; line-height: 1.6; }
.sync-ok { background: #EAF3DE; color: #27500A; font-size: 11px; margin-top: 8px; padding: 4px 10px; border-radius: 20px; display: inline-block; }
.sync-err { background: #FCEBEB; color: #791F1F; font-size: 11px; margin-top: 8px; padding: 4px 10px; border-radius: 20px; display: inline-block; }
#name-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 14px; padding: 28px 24px; background: #f7f7fb; }
#name-screen .welcome { font-size: 18px; font-weight: 700; color: #222; text-align: center; }
#name-screen p { font-size: 13px; color: #666; text-align: center; line-height: 1.6; }
#name-input { border: 1px solid #ddd; border-radius: 10px; padding: 9px 14px; font-size: 15px; font-family: inherit; width: 100%; max-width: 280px; text-align: center; color: #222; background: #fff; }
#name-input:focus { outline: none; border-color: #7F77DD; }
#start-btn { background: #534AB7; color: #fff; border: none; border-radius: 10px; padding: 11px 32px; font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 600; transition: background .15s; }
#start-btn:hover { background: #3C3489; }
#api-key-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 14px; padding: 28px 24px; background: #f7f7fb; }
#api-key-screen .welcome { font-size: 16px; font-weight: 700; color: #222; text-align: center; }
#api-key-screen p { font-size: 12px; color: #666; text-align: center; line-height: 1.6; max-width: 320px; }
#api-input { border: 1px solid #ddd; border-radius: 10px; padding: 9px 14px; font-size: 13px; font-family: inherit; width: 100%; max-width: 320px; color: #222; background: #fff; }
#api-input:focus { outline: none; border-color: #7F77DD; }
#api-btn { background: #534AB7; color: #fff; border: none; border-radius: 10px; padding: 10px 28px; font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 600; }
#api-btn:hover { background: #3C3489; }
.note { font-size: 11px; color: #999; text-align: center; max-width: 300px; line-height: 1.5; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div style="width:36px;height:36px;border-radius:50%;background:#7F77DD;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">🤖</div>
    <div>
      <div class="hname">TecnoBot</div>
      <div class="hsub">Tutor de Tecnología e Informática · Grado 6°</div>
    </div>
    <div id="score-badge">— / 5.0</div>
  </div>
  <div id="name-screen" style="display:none;">
    <div style="width:56px;height:56px;border-radius:50%;background:#7F77DD;display:flex;align-items:center;justify-content:center;font-size:28px;">🤖</div>
    <div class="welcome">¡Hola! Soy TecnoBot</div>
    <p>Tu tutor de Tecnología e Informática.<br>¿Cómo te llamas?</p>
    <input id="name-input" type="text" placeholder="Escribe tu nombre completo..." maxlength="60"/>
    <button id="start-btn" onclick="startChat()">Empezar ✦</button>
  </div>

  <div id="chat-area" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
    <div id="messages">
      <div id="typing"><span></span><span></span><span></span></div>
    </div>
    <div id="input-area">
      <textarea id="user-input" placeholder="Escribe tu pregunta aquí..." onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()">Enviar</button>
    </div>
  </div>
</div>

<script>
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycby4RL9chOq2Gyrn2_a3Zq0axdrjj6rmVn6UAyOpkv9sSJ0vvKX8fkxlNVXXRufPGYPXvw/exec';
let studentName = '';
let history = [];
let sessionEnded = false;
let apiKey = ' ';
  
function startChat() {
  const input = document.getElementById('name-input');
  studentName = input.value.trim();
  if (!studentName) { input.focus(); return; }
  document.getElementById('name-screen').style.display = 'none';
  const ca = document.getElementById('chat-area');
  ca.style.display = 'flex';
  sendBotGreeting();
}

function sendBotGreeting() {
  const msg = `¡Hola **${studentName}**! Me alegra tenerte aquí 🎉\n\nSoy **TecnoBot**, tu tutor de Tecnología e Informática. Puedo explicarte temas como hardware, software, internet, pensamiento computacional, ofimática y mucho más.\n\n¿Sobre qué quieres aprender hoy? Cuando termines, escribe **"evalúame"** para hacer tu evaluación.`;
  addMessage('bot', msg);
  history.push({ role: 'assistant', content: msg });
}

function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const typing = document.getElementById('typing');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const now = new Date();
  const time = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');

  const reportMatch = text.match(/---REPORTE_INICIO---([\s\S]*?)---REPORTE_FIN---/);
  let html = '';

  if (reportMatch) {
    const block = reportMatch[1];
    const nota = (block.match(/NOTA:\s*([\d.]+)\/5\.0/) || [])[1] || '—';
    const fortalezas = (block.match(/FORTALEZAS:\s*(.+)/) || [])[1] || '';
    const mejorar = (block.match(/MEJORAR:\s*(.+)/) || [])[1] || '';
    const mensaje = (block.match(/MENSAJE:\s*(.+)/) || [])[1] || '';
    const alerta = (block.match(/ALERTA:\s*(.+)/) || [])[1] || 'NINGUNA';
    const badge = document.getElementById('score-badge');
    badge.style.display = 'block';
    badge.textContent = nota + ' / 5.0';
    const cleanText = text.replace(/---REPORTE_INICIO---[\s\S]*?---REPORTE_FIN---/, '').trim();
    html = cleanText ? marked.parse(cleanText) : '';
    html += `<div class="eval-card">
      <div class="etitle">📋 Reporte enviado a tu docente</div>
      <div class="enota">${nota} <span>/ 5.0</span></div>
      <div class="edet">
        <strong>Estudiante:</strong> ${studentName}<br>
        <strong>Fortalezas:</strong> ${fortalezas}<br>
        <strong>Por mejorar:</strong> ${mejorar}<br>
        <strong>Mensaje:</strong> ${mensaje}
      </div>
      <div id="sync-status" style="background:#FAEEDA;color:#633806;font-size:11px;margin-top:8px;padding:4px 10px;border-radius:20px;display:inline-block;">Guardando en Google Sheets...</div>
    </div>`;
    sessionEnded = true;
    setTimeout(() => {
      document.getElementById('user-input').disabled = true;
      document.getElementById('send-btn').disabled = true;
      document.getElementById('user-input').placeholder = 'Sesión completada ✓';
    }, 100);
    sendToSheets({ estudiante: studentName, nota, fortalezas, mejorar, mensaje, alerta });
  } else {
    html = marked.parse(text);
  }

  div.innerHTML = `<div class="bubble">${html}</div><div class="msg-time">${time}</div>`;
  msgs.insertBefore(div, typing);
  msgs.scrollTop = msgs.scrollHeight;
}

async function sendToSheets(data) {
  try {
    await fetch(SHEETS_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
    const el = document.getElementById('sync-status');
    if (el) { el.className = 'sync-ok'; el.textContent = '✓ Guardado en Google Sheets'; }
  } catch(e) {
    const el = document.getElementById('sync-status');
    if (el) { el.className = 'sync-err'; el.textContent = '✗ No se pudo guardar automáticamente.'; }
  }
}

function showTyping() { const t = document.getElementById('typing'); t.style.display = 'flex'; document.getElementById('messages').scrollTop = 9999; }
function hideTyping() { document.getElementById('typing').style.display = 'none'; }

async function sendMessage() {
  if (sessionEnded) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage('user', text);
  history.push({ role: 'user', content: text });
  document.getElementById('send-btn').disabled = true;
  showTyping();
  try {
    const res = await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'chat', messages: history })
    });
    const data = await res.json();
    const reply = data.reply || 'Hubo un error. Por favor intenta de nuevo.';
    hideTyping();
    addMessage('bot', reply);
    history.push({ role: 'assistant', content: reply });
  } catch(e) {
    hideTyping();
    addMessage('bot', 'Hubo un problema de conexión. Por favor intenta de nuevo.');
  }
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') startChat(); });

window.onload = () => {
   document.getElementById('name-screen').style.display = 'flex';
};
</script>
</body>
</html>
